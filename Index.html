<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CardioLog Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root { --red: #ef233c; --dark: #2b2d42; --gray: #8d99ae; --light: #edf2f4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--light); margin: 0; padding: env(safe-area-inset-top) 15px 20px 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 22px; color: var(--dark); text-align: center; margin-top: 10px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; text-align: center; -webkit-appearance: none; }
        button { background: var(--red); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-export { background: var(--dark); margin-top: 10px; font-size: 14px; padding: 10px; }
        .chart-container { height: 220px; margin: 20px 0; }
        .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .log-val { font-weight: 600; font-size: 17px; }
        .log-date { font-size: 12px; color: var(--gray); }
        .status { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="card">
    <h1>❤️ CardioLog</h1>
    <div class="input-row">
        <input type="number" id="sys" placeholder="SYS" pattern="\d*">
        <input type="number" id="dia" placeholder="DIA" pattern="\d*">
        <input type="number" id="bpm" placeholder="BPM" pattern="\d*">
    </div>
    <button onclick="save()">REGISTRA ORA</button>
    <button class="btn-export" onclick="exportData()">⬇️ SCARICA EXCEL (CSV)</button>
</div>

<div class="card">
    <div class="chart-container"><canvas id="myChart"></canvas></div>
    <div id="history"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('cardio_v3')) || [];
    let chart;

    function init() {
        const ctx = document.getElementById('myChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(i => i.t),
                datasets: [
                    { label: 'SYS', data: data.map(i => i.s), borderColor: '#ef233c', tension: 0.4 },
                    { label: 'DIA', data: data.map(i => i.d), borderColor: '#457b9d', tension: 0.4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        render();
    }

    function save() {
        const s = document.getElementById('sys').value;
        const d = document.getElementById('dia').value;
        const b = document.getElementById('bpm').value;
        if(!s || !d) return;
        const t = new Date().toLocaleString('it-IT', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
        data.push({t, s, d, b});
        localStorage.setItem('cardio_v3', JSON.stringify(data));
        render();
        chart.data.labels = data.map(i => i.t);
        chart.data.datasets[0].data = data.map(i => i.s);
        chart.data.datasets[1].data = data.map(i => i.d);
        chart.update();
    }

    function render() {
        const h = document.getElementById('history');
        h.innerHTML = data.slice(-5).reverse().map(i => `
            <div class="log-entry">
                <div>
                    <div class="log-val">${i.s}/${i.d} <small>${i.b} bpm</small></div>
                    <div class="log-date">${i.t}</div>
                </div>
                <div class="status" style="background:${(i.s<135 && i.d<85)?'#2b9348':'#ef233c'}"></div>
            </div>
        `).join('');
    }

    function exportData() {
        let csv = "Data,Sistolica,Diastolica,BPM\n" + data.map(i => `${i.t},${i.s},${i.d},${i.b}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'salute_cuore.csv'; a.click();
    }

    init();
</script>
</body>
</html>
