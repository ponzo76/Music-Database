<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Archivio Consapevolezza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card: #181818; --accent: #1DB954; --text: #ececec; --sub: #a0a0a0; --genius: #ffff64; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        /* Menu Puntini */
        .menu-container { position: relative; }
        .dots-btn { background: none; border: none; color: var(--sub); font-size: 1.5rem; cursor: pointer; padding: 5px 10px; }
        .dropdown { display: none; position: absolute; right: 0; top: 30px; background: #252525; border: 1px solid #444; border-radius: 8px; z-index: 100; min-width: 150px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .dropdown button { width: 100%; padding: 12px; text-align: left; background: none; border: none; color: white; font-size: 0.85rem; border-bottom: 1px solid #333; cursor: pointer; }
        .dropdown button:last-child { border: none; color: #ff5555; }

        /* Modal e Testi */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 800px; margin: 40px auto; }
        .close-btn { float: right; font-size: 2.5rem; color: var(--accent); cursor: pointer; background: none; border: none; }
        .track-item { padding: 15px; border-bottom: 1px solid #333; color: var(--accent); font-weight: 600; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .lyrics-col { font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; color: #ccc; }
        .lyrics-col h4 { color: var(--accent); border-bottom: 1px solid #444; margin-bottom: 10px; font-size: 0.7rem; text-transform: uppercase; }

        /* Card */
        .album-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; transition: 0.3s; }
        .album-card.done { border-color: var(--accent); opacity: 0.8; }
        .album-header { display: flex; gap: 15px; align-items: flex-start; }
        .cover { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: #222; }
        .info { flex: 1; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-size: 0.8rem; text-align: center; text-decoration: none; cursor: pointer; }
        .btn-play { background: var(--accent); color: #000; }
        .btn-lyrics { background: var(--genius); color: #000; }
        .notes-box { width: 100%; background: #222; border: 1px solid #333; color: #ddd; padding: 12px; border-radius: 10px; margin: 12px 0; font-family: inherit; font-size: 0.9rem; box-sizing: border-box; resize: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--accent);">Archivio Consapevolezza</h1>
    
    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button class="btn" style="background:#333; color:white;" onclick="addNewAlbum()">➕ NUOVO ALBUM</button>
    </div>

    <div id="list"></div>

    <div id="lyricsModal" class="modal">
        <button class="close-btn" onclick="closeModal()">×</button>
        <div id="modalBody" class="modal-content"></div>
    </div>

<script>
let myData = JSON.parse(localStorage.getItem('myMusicData')) || [];

function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    myData.forEach((album, index) => {
        list.innerHTML += `
            <div class="album-card ${album.done ? 'done' : ''}">
                <div class="album-header">
                    <img src="${album.cover || 'https://via.placeholder.com/70'}" class="cover" onclick="changeCover(${index})">
                    <div class="info">
                        <div style="font-weight:700">${album.title}</div>
                        <div style="color:var(--sub); font-size:0.8rem">${album.artist}</div>
                    </div>
                    <div class="menu-container">
                        <button class="dots-btn" onclick="toggleDropdown(${index})">⋮</button>
                        <div id="drop-${index}" class="dropdown">
                            <button onclick="toggleDone(${index})">${album.done ? '↩️ Da ascoltare' : '✅ Ascoltato'}</button>
                            <button onclick="editAlbumInfo(${index})">✏️ Modifica Info</button>
                            <button onclick="deleteAlbum(${index})">🗑️ Elimina</button>
                        </div>
                    </div>
                </div>
                <textarea class="notes-box" placeholder="Note..." oninput="updateNote(${index}, this.value)">${album.note || ''}</textarea>
                <div class="actions">
                    <a href="spotify:search:${encodeURIComponent(album.artist + ' ' + album.title)}" class="btn btn-play">PLAY</a>
                    <button class="btn btn-lyrics" onclick="openLyrics(${index})">TESTI</button>
                </div>
            </div>
        `;
    });
}

// GESTIONE ALBUM
function toggleDropdown(i) {
    const drop = document.getElementById(`drop-${i}`);
    const isVisible = drop.style.display === 'block';
    document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
    drop.style.display = isVisible ? 'none' : 'block';
}

function toggleDone(i) { myData[i].done = !myData[i].done; save(); render(); }

function editAlbumInfo(i) {
    const t = prompt("Nuovo titolo:", myData[i].title);
    const a = prompt("Nuovo artista:", myData[i].artist);
    if(t && a) { myData[i].title = t; myData[i].artist = a; save(); render(); }
}

function deleteAlbum(i) { if(confirm("Eliminare definitivamente l'album?")) { myData.splice(i, 1); save(); render(); } }

function addNewAlbum() {
    const title = prompt("Titolo Album:");
    const artist = prompt("Artista:");
    if(title && artist) {
        myData.unshift({ title, artist, cover: "", note: "", tracks: [], done: false });
        save(); render();
    }
}

// GESTIONE TESTI E MODIFICHE
function openLyrics(aIdx) {
    const album = myData[aIdx];
    const modal = document.getElementById('lyricsModal');
    const body = document.getElementById('modalBody');
    modal.style.display = 'block';
    let html = `<h2>${album.title}</h2><ul style="padding:0">`;
    (album.tracks || []).forEach((track, tIdx) => {
        html += `
            <li class="track-item">
                <span onclick="showTrackLyrics(${aIdx}, ${tIdx})">${track.name}</span>
                <button onclick="editTrack(${aIdx}, ${tIdx})" style="background:none; border:none; color:var(--sub); font-size:0.7rem">MODIFICA</button>
            </li>`;
    });
    html += `</ul><button class="btn btn-play" style="width:100%; margin-top:20px" onclick="addTrack(${aIdx})">+ AGGIUNGI CANZONE</button>`;
    body.innerHTML = html;
}

function showTrackLyrics(aIdx, tIdx) {
    const track = myData[aIdx].tracks[tIdx];
    const body = document.getElementById('modalBody');
    body.innerHTML = `
        <button class="btn" style="background:#333; color:white; margin-bottom:20px" onclick="openLyrics(${aIdx})">← Tracklist</button>
        <h3 style="color:var(--accent)">${track.name}</h3>
        <div class="lyrics-grid">
            <div class="lyrics-col"><h4>Originale</h4>${track.original}</div>
            <div class="lyrics-col"><h4>Italiano</h4>${track.translated}</div>
        </div>
        <button class="btn" style="background:#444; color:white; width:100%; margin-top:30px" onclick="editTrack(${aIdx}, ${tIdx})">MODIFICA TESTI</button>
    `;
}

function addTrack(aIdx) {
    const name = prompt("Titolo Canzone:");
    if(!name) return;
    const original = prompt("Testo originale:");
    const translated = prompt("Traduzione:");
    if(!myData[aIdx].tracks) myData[aIdx].tracks = [];
    myData[aIdx].tracks.push({ name, original, translated });
    save(); openLyrics(aIdx);
}

function editTrack(aIdx, tIdx) {
    const track = myData[aIdx].tracks[tIdx];
    const newName = prompt("Modifica titolo:", track.name);
    const newOrig = prompt("Modifica testo originale:", track.original);
    const newTrans = prompt("Modifica traduzione:", track.translated);
    if(newName) {
        myData[aIdx].tracks[tIdx] = { name: newName, original: newOrig, translated: newTrans };
        save(); openLyrics(aIdx);
    }
}

function changeCover(i) {
    const url = prompt("Incolla link nuova copertina:");
    if(url) { myData[i].cover = url; save(); render(); }
}

function updateNote(i, v) { myData[i].note = v; save(); }
function save() { localStorage.setItem('myMusicData', JSON.stringify(myData)); }
function closeModal() { document.getElementById('lyricsModal').style.display = 'none'; }

// Chiudi menu se clicchi fuori
window.onclick = function(event) {
    if (!event.target.matches('.dots-btn')) {
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
    }
}

render();
</script>
</body>
</html>
