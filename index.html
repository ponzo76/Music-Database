<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>BP Logger</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #111;
    --fg: #eee;
    --accent: #4caf50;
    --border: #333;
  }
  body {
    font-family: ui-monospace, monospace;
    background: var(--bg);
    color: var(--fg);
    margin: 20px;
  }
  h2 { color: var(--accent); }
  input, button {
    font-family: inherit;
    font-size: 14px;
    padding: 6px;
    margin: 4px 0;
    background: #222;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  button:hover { background: #333; cursor: pointer; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px;
    text-align: center;
  }
  th { background: #1a1a1a; }
</style>
</head>
<body>

<h2>BP Logger v1.1</h2>

<div>
  <label>Sistolica <input type="number" id="sys"></label><br>
  <label>Diastolica <input type="number" id="dia"></label><br>
  <label>Battiti <input type="number" id="hr"></label><br>
  <label>Note <input type="text" id="note"></label><br>

  <button onclick="addEntry()">Aggiungi</button>
  <button onclick="exportTXT()">Esporta TXT</button>
  <button onclick="exportJSON()">Esporta JSON</button>
</div>

<table id="tbl">
  <thead>
    <tr>
      <th>ID</th>
      <th>Timestamp</th>
      <th>SYS</th>
      <th>DIA</th>
      <th>HR</th>
      <th>Note</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
  let data = JSON.parse(localStorage.getItem("bpdata") || "[]");

  function save() {
    localStorage.setItem("bpdata", JSON.stringify(data));
  }

  function render() {
    const tbody = document.querySelector("#tbl tbody");
    tbody.innerHTML = "";
    data.forEach(entry => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${entry.id}</td>
        <td>${entry.timestamp}</td>
        <td>${entry.sys}</td>
        <td>${entry.dia}</td>
        <td>${entry.hr || "-"}</td>
        <td>${entry.note || ""}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function addEntry() {
    const sys = document.getElementById("sys").value;
    const dia = document.getElementById("dia").value;
    const hr  = document.getElementById("hr").value;
    const note = document.getElementById("note").value;

    if (!sys || !dia) {
      alert("SYS e DIA sono obbligatori.");
      return;
    }

    const entry = {
      id: crypto.randomUUID().slice(0, 8),
      timestamp: new Date().toISOString(),
      sys, dia, hr, note
    };

    data.push(entry);
    save();
    render();
  }

  function exportTXT() {
    let lines = ["# BP Logger Export", ""];
    data.forEach(e => {
      lines.push(`${e.id} | ${e.timestamp} | ${e.sys}/${e.dia} | HR:${e.hr || "-"} | ${e.note || ""}`);
    });
    download(lines.join("\n"), "bp_log.txt");
  }

  function exportJSON() {
    download(JSON.stringify(data, null, 2), "bp_log.json");
  }

  function download(content, filename) {
    const blob = new Blob([content], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  render();
</script>

</body>
</html>
