<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Archivio Consapevolezza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card: #181818; --accent: #1DB954; --text: #ececec; --sub: #a0a0a0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; }
        h1 { font-size: 1.6rem; margin-top: 40px; color: var(--accent); text-align: center; }
        .backup-btns { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-small { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; font-weight: 600; }
        #search { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem; }
        .album-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; position: relative; }
        .album-header { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .cover-container { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
        .cover { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; box-shadow: 0 6px 15px rgba(0,0,0,0.6); background: #222; cursor: pointer; }
        .info { flex: 1; }
        .title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; line-height: 1.2; }
        .artist { color: var(--sub); font-size: 0.85rem; margin-bottom: 6px; }
        .rym-badge { display: inline-block; background: rgba(29, 185, 84, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; }
        .notes-box { width: 100%; background: #222; border: 1px solid #333; color: #ddd; padding: 12px; border-radius: 10px; margin: 12px 0; font-family: inherit; font-size: 0.9rem; resize: none; box-sizing: border-box; line-height: 1.4; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .play-btn { flex: 2; background: var(--accent); color: #000; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 700; text-align: center; font-size: 0.85rem; }
        .check-btn { flex: 1; background: #333; color: #fff; border: none; border-radius: 10px; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
        .fetch-btn { width: 100%; background: #444; color: #fff; border: none; padding: 6px; border-radius: 6px; font-size: 0.65rem; margin-top: 5px; cursor: pointer; }
        .hidden { display: none; }
        .completed { border-color: var(--accent); opacity: 0.8; }
    </style>
</head>
<body>

    <h1>🎧 Archivio Consapevolezza</h1>
    
    <div class="backup-btns">
        <button class="btn-small" onclick="exportData()">📤 BACKUP</button>
        <button class="btn-small" onclick="document.getElementById('importFile').click()">📥 IMPORTA</button>
        <button class="btn-small" onclick="addNewAlbum()">➕ AGGIUNGI</button>
        <input type="file" id="importFile" class="hidden" onchange="importData(event)">
    </div>

    <input type="text" id="search" placeholder="Filtra la tua collezione..." onkeyup="filter()">

    <div id="list"></div>

<script>
// Database iniziale (senza link pesanti, l'app li cercherà)
const initialAlbums = [
    { title: "Animals", artist: "Pink Floyd", year: "1977", tags: "70s prog", rym: "4.29", cover: "", note: "" },
    { title: "To Pimp a Butterfly", artist: "Kendrick Lamar", year: "2015", tags: "jazz rap", rym: "4.35", cover: "", note: "" },
    { title: "OK Computer", artist: "Radiohead", year: "1997", tags: "90s art rock", rym: "4.27", cover: "", note: "" },
    { title: "Wish You Were Here", artist: "Pink Floyd", year: "1975", tags: "70s sunset", rym: "4.30", cover: "", note: "" },
    { title: "Ko de mondo", artist: "C.S.I.", year: "1994", tags: "italia 90s", rym: "4.10", cover: "", note: "" },
    { title: "Adore", artist: "Smashing Pumpkins", year: "1998", tags: "gothic 90s", rym: "3.55", cover: "", note: "" },
    { title: "Laughing Stock", artist: "Talk Talk", year: "1991", tags: "post-rock silence", rym: "4.22", cover: "", note: "" },
    { title: "Ladies and Gentlemen...", artist: "Spiritualized", year: "1997", tags: "space rock", rym: "4.10", cover: "", note: "" },
    { title: "Spiderland", artist: "Slint", year: "1991", tags: "dark 90s", rym: "4.20", cover: "", note: "" },
    { title: "In the Court of the Crimson King", artist: "King Crimson", year: "1969", tags: "60s prog", rym: "4.30", cover: "", note: "" }
];

let myData = JSON.parse(localStorage.getItem('myMusicData')) || initialAlbums;

function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    myData.forEach((album, index) => {
        list.innerHTML += `
            <div class="album-card ${album.done ? 'completed' : ''}" id="card-${index}">
                <div class="album-header">
                    <div class="cover-container">
                        <img src="${album.cover || 'https://via.placeholder.com/90x90?text=?'}" class="cover" id="cover-${index}" onclick="fetchCover(${index})">
                        <button class="fetch-btn" onclick="fetchCover(${index})">CERCA</button>
                    </div>
                    <div class="info">
                        <div class="title">${album.title}</div>
                        <div class="artist">${album.artist} (${album.year})</div>
                        <div class="rym-badge">⭐ RYM: ${album.rym}</div>
                    </div>
                </div>
                <textarea class="notes-box" placeholder="Scrivi il tuo tramonto..." oninput="updateNote(${index}, this.value)">${album.note || ''}</textarea>
                <div class="actions">
                    <a href="spotify:search:${encodeURIComponent(album.artist + ' ' + album.title)}" class="play-btn">ASCOLTA</a>
                    <button class="check-btn" onclick="toggle(${index})">${album.done ? 'FATTO' : 'DA FARE'}</button>
                    <button class="check-btn" style="background:#441111" onclick="deleteAlbum(${index})">🗑️</button>
                </div>
            </div>
        `;
    });
}

// FUNZIONE MAGICA: Cerca la copertina su Apple Music
async function fetchCover(index) {
    const album = myData[index];
    const query = encodeURIComponent(`${album.artist} ${album.title}`);
    try {
        const response = await fetch(`https://itunes.apple.com/search?term=${query}&entity=album&limit=1`);
        const data = await response.json();
        if (data.results.length > 0) {
            let highResCover = data.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
            myData[index].cover = highResCover;
            save();
            render();
        } else {
            alert("Copertina non trovata.");
        }
    } catch (e) {
        alert("Errore nella ricerca.");
    }
}

function updateNote(index, val) { myData[index].note = val; save(); }
function toggle(index) { myData[index].done = !myData[index].done; save(); render(); }
function save() { localStorage.setItem('myMusicData', JSON.stringify(myData)); }
function deleteAlbum(index) { if(confirm("Eliminare?")) { myData.splice(index, 1); save(); render(); } }

function addNewAlbum() {
    const title = prompt("Titolo Album:");
    const artist = prompt("Artista:");
    const rym = prompt("Voto RYM (es. 4.10):");
    if(title && artist) {
        myData.unshift({ title, artist, year: "N.D.", tags: "", rym, cover: "", note: "" });
        save();
        render();
    }
}

function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(myData));
    const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", "musica.json"); a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => { myData = JSON.parse(e.target.result); save(); render(); };
    reader.readAsText(event.target.files[0]);
}

function filter() {
    let q = document.getElementById('search').value.toLowerCase();
    myData.forEach((album, i) => {
        let text = (album.title + album.artist).toLowerCase();
        document.getElementById(`card-${i}`).classList.toggle('hidden', !text.includes(q));
    });
}

render();
</script>
</body>
</html>
